name: Tests

on:
  push:
  pull_request:

jobs:
  vitest:
    name: vitest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run vitest suite
        run: bunx vitest run
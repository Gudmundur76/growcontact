name: Tests

on:
  push:
  pull_request:

jobs:
  db-errors:
    name: db-errors unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run db-errors tests
        run: bunx vitest run src/server/db-errors.test.ts